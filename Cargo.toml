[package]
name = "predicated"
version = "0.1.0"
edition = "2024"
description = "Geometry-oriented robust predicates with structural scalar awareness."
license = "MIT OR Apache-2.0"

[dependencies]
geogram_predicates = { git = "https://github.com/glennDittmann/geogram_predicates.git", branch = "dev-rust-port", default-features = false, optional = true }
hyperreal = { version = "0.10", optional = true }
inari = { version = "2", default-features = false, optional = true }
realistic_blas = { version = "0.3", optional = true }
robust = { version = "1.2", optional = true }

[dev-dependencies]
criterion = "0.5"
serde_json = "1"

[features]
default = ["std"]
std = []
geogram = ["dep:geogram_predicates"]
hyperreal = ["dep:hyperreal"]
interval = ["dep:inari"]
realistic-blas = ["dep:realistic_blas"]
robust = ["dep:robust"]

[[bench]]
name = "predicates"
harness = false
